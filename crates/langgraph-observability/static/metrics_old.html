<!DOCTYPE html>
<html>

<head>
    <title>LangGraph Observability - Metrics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header {
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .metric-card {
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #007bff;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>LangGraph Observability Dashboard</h1>
        <div class="nav">
            <a href="/api/runs">Runs</a>
            <a href="/api/metrics">Metrics</a>
            <a href="/api/prompts">Prompts</a>
        </div>
    </div>

    <h2>Performance Metrics</h2>
    <div id="metrics-container">
        <p>Loading metrics...</p>
    </div>

    <script>
        async function loadMetrics() {
            try {
                const response = await fetch('/api/metrics/current');
                const data = await response.json();

                const container = document.getElementById('metrics-container');
                container.innerHTML = `
                    <div class="metric-grid">
                        <div class="metric-card">
                            <h3>Total Runs</h3>
                            <div class="metric-value">${data.total_runs || 0}</div>
                        </div>
                        
                        <div class="metric-card">
                            <h3>Successful Runs</h3>
                            <div class="metric-value">${data.successful_runs || 0}</div>
                        </div>
                        
                        <div class="metric-card">
                            <h3>Failed Runs</h3>
                            <div class="metric-value">${data.failed_runs || 0}</div>
                        </div>
                        
                        <div class="metric-card">
                            <h3>Average Duration</h3>
                            <div class="metric-value">${data.avg_duration || 0}ms</div>
                        </div>
                        
                        <div class="metric-card">
                            <h3>Memory Usage</h3>
                            <div class="metric-value">${Math.round((data.memory_usage || 0) / 1024 / 1024)}MB</div>
                        </div>
                        
                        <div class="metric-card">
                            <h3>CPU Usage</h3>
                            <div class="metric-value">${(data.cpu_usage || 0).toFixed(1)}%</div>
                        </div>
                    </div>
                    
                    <h3>Recent Metrics</h3>
                    <div id="metrics-table">
                        ${data.recent_metrics ? data.recent_metrics.map(metric => `
                            <div class="metric-card">
                                <h4>${metric.name}</h4>
                                <p><strong>Value:</strong> ${metric.value}</p>
                                <p><strong>Timestamp:</strong> ${new Date(metric.timestamp).toLocaleString()}</p>
                                ${metric.labels ? `<p><strong>Labels:</strong> ${JSON.stringify(metric.labels)}</p>` : ''}
                            </div>
                        `).join('') : '<p>No recent metrics available</p>'}
                    </div>
                `;
            } catch (error) {
                document.getElementById('metrics-container').innerHTML = `<p>Error loading metrics: ${error.message}</p>`;
            }
        }

        loadMetrics();
        setInterval(loadMetrics, 5000); // Refresh every 5 seconds
    </script>
</body>

</html>
