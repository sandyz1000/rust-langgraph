<!DOCTYPE html>
<html>

<head>
    <title>LangGraph Observability - Prompts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header {
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .prompt-item {
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
        }

        .prompt-content {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 3px;
            white-space: pre-wrap;
        }

        .analysis {
            background: #e9ecef;
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
        }

        .score {
            font-weight: bold;
        }

        .high {
            color: green;
        }

        .medium {
            color: orange;
        }

        .low {
            color: red;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>LangGraph Observability Dashboard</h1>
        <div class="nav">
            <a href="/api/runs">Runs</a>
            <a href="/api/metrics">Metrics</a>
            <a href="/api/prompts">Prompts</a>
        </div>
    </div>

    <h2>Prompt Analysis</h2>
    <div id="prompts-container">
        <p>Loading prompts...</p>
    </div>

    <script>
        async function loadPrompts() {
            try {
                const response = await fetch('/api/prompts/list');
                const prompts = await response.json();

                const container = document.getElementById('prompts-container');
                if (prompts.length === 0) {
                    container.innerHTML = '<p>No prompts found.</p>';
                    return;
                }

                container.innerHTML = prompts.map(prompt => `
                    <div class="prompt-item">
                        <h3>Prompt Execution</h3>
                        <p><strong>Model:</strong> ${prompt.model}</p>
                        <p><strong>Executed:</strong> ${new Date(prompt.timestamp).toLocaleString()}</p>
                        <p><strong>Tokens:</strong> Input: ${prompt.input_tokens}, Output: ${prompt.output_tokens}</p>
                        <p><strong>Duration:</strong> ${prompt.duration_ms}ms</p>
                        
                        <h4>Prompt Content:</h4>
                        <div class="prompt-content">${prompt.prompt}</div>
                        
                        <h4>Response:</h4>
                        <div class="prompt-content">${prompt.response}</div>
                        
                        ${prompt.analysis ? `
                        <div class="analysis">
                            <h4>Analysis:</h4>
                            <p><strong>Quality Score:</strong> <span class="score ${getScoreClass(prompt.analysis.quality_score)}">${prompt.analysis.quality_score}/10</span></p>
                            <p><strong>Injection Risk:</strong> <span class="score ${prompt.analysis.injection_risk > 0.7 ? 'low' : prompt.analysis.injection_risk > 0.3 ? 'medium' : 'high'}">${(prompt.analysis.injection_risk * 100).toFixed(1)}%</span></p>
                            ${prompt.analysis.suggestions.length > 0 ? `
                                <h5>Suggestions:</h5>
                                <ul>
                                    ${prompt.analysis.suggestions.map(s => `<li>${s}</li>`).join('')}
                                </ul>
                            ` : ''}
                        </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('prompts-container').innerHTML = `<p>Error loading prompts: ${error.message}</p>`;
            }
        }

        function getScoreClass(score) {
            if (score >= 8) return 'high';
            if (score >= 6) return 'medium';
            return 'low';
        }

        loadPrompts();
        setInterval(loadPrompts, 5000); // Refresh every 5 seconds
    </script>
</body>

</html>
