<!DOCTYPE html>
<html>

<head>
    <title>LangGraph Observability - Run Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header {
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .span-item {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 3px;
        }

        .timeline {
            position: relative;
            padding-left: 20px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #007bff;
        }

        .timeline-item {
            position: relative;
            margin: 10px 0;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 15px;
            width: 10px;
            height: 10px;
            background: #007bff;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>LangGraph Observability Dashboard</h1>
        <div class="nav">
            <a href="/api/runs">← Back to Runs</a>
            <a href="/api/metrics">Metrics</a>
            <a href="/api/prompts">Prompts</a>
        </div>
    </div>

    <div id="run-details">
        <p>Loading run details...</p>
    </div>

    <script>
        const runId = window.location.pathname.split('/').pop();

        async function loadRunDetails() {
            try {
                const [runResponse, spansResponse] = await Promise.all([
                    fetch(`/api/runs/${runId}`),
                    fetch(`/api/runs/${runId}/spans`)
                ]);

                const run = await runResponse.json();
                const spans = await spansResponse.json();

                const container = document.getElementById('run-details');
                container.innerHTML = `
                    <h2>Run: ${run.id}</h2>
                    
                    <div class="section">
                        <h3>Overview</h3>
                        <p><strong>Graph ID:</strong> ${run.graph_id}</p>
                        <p><strong>Status:</strong> ${run.status}</p>
                        <p><strong>Started:</strong> ${new Date(run.start_time).toLocaleString()}</p>
                        ${run.end_time ? `<p><strong>Ended:</strong> ${new Date(run.end_time).toLocaleString()}</p>` : ''}
                        ${run.error ? `<p><strong>Error:</strong> ${run.error}</p>` : ''}
                    </div>
                    
                    <div class="section">
                        <h3>Initial State</h3>
                        <pre>${JSON.stringify(run.initial_state, null, 2)}</pre>
                    </div>
                    
                    ${run.final_state ? `
                    <div class="section">
                        <h3>Final State</h3>
                        <pre>${JSON.stringify(run.final_state, null, 2)}</pre>
                    </div>
                    ` : ''}
                    
                    <div class="section">
                        <h3>Execution Timeline</h3>
                        <div class="timeline">
                            ${spans.map(span => `
                                <div class="timeline-item">
                                    <h4>${span.name}</h4>
                                    <p><strong>Operation:</strong> ${span.operation_name}</p>
                                    <p><strong>Started:</strong> ${new Date(span.start_time).toLocaleString()}</p>
                                    ${span.end_time ? `<p><strong>Ended:</strong> ${new Date(span.end_time).toLocaleString()}</p>` : ''}
                                    <p><strong>Status:</strong> ${span.status}</p>
                                    ${span.error ? `<p><strong>Error:</strong> ${span.error}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('run-details').innerHTML = `<p>Error loading run details: ${error.message}</p>`;
            }
        }

        loadRunDetails();
    </script>
</body>

</html>
